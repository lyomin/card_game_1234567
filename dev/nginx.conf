events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        
        # 2. FRONTEND REVERSE PROXY: Visi kiti keliai (/*) nukreipiami į Vite/Frontend (port 5173)
        location / {
            proxy_pass http://host.docker.internal:5173;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_http_version 1.1;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;

        }

        # 1. BACKEND REVERSE PROXY: /ratings/* nukreipiama į localhost:8080
        location /ratings/ {
            proxy_pass http://host.docker.internal:8080/ratings/;
            
            # Standartinės antraštės reverse proxy veikimui
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        
    }
}
